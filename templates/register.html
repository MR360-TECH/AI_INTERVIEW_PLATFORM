<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <style>
        body {
            background: linear-gradient(135deg, #eef2f7, #e4e9f2);
            min-height: 100vh;
        }
        .register-card {
            border: none;
            border-radius: 18px;
            overflow: hidden;
        }
        .register-header {
            background: linear-gradient(135deg, #4e73df, #224abe);
            color: #fff;
            padding: 30px;
            text-align: center;
        }
        .register-header h2 {
            font-weight: 700;
            margin-bottom: 4px;
        }
        .register-header p {
            opacity: 0.85;
            margin: 0;
            font-size: 0.9rem;
        }
        .form-body {
            padding: 30px 35px;
        }
        .form-label {
            font-weight: 500;
            font-size: 0.88rem;
            color: #444;
        }
        .form-control, .form-select {
            border-radius: 8px;
            padding: 10px 12px;
            border: 1px solid #dfe3ea;
        }
        .form-control:focus, .form-select:focus {
            border-color: #4e73df;
            box-shadow: 0 0 0 0.2rem rgba(78,115,223,0.15);
        }
        .edu-options .form-check {
            background: #f8f9fc;
            border: 1px solid #e3e6ec;
            border-radius: 8px;
            padding: 8px 14px 8px 34px;
            margin-right: 8px;
            margin-bottom: 8px;
            display: inline-block;
        }
        .btn-register {
            background: linear-gradient(135deg, #4e73df, #224abe);
            border: none;
            border-radius: 8px;
            padding: 11px;
            font-weight: 600;
            letter-spacing: 0.3px;
        }
        .btn-register:hover {
            opacity: 0.92;
        }
    </style>
</head>
<body>
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="card register-card shadow-lg">

                <div class="register-header">
                    <i class="bi bi-person-plus-fill fs-1"></i>
                    <h2>Create Your Account</h2>
                    <p>Join and start practicing your mock interviews</p>
                </div>

                <div class="form-body">
                    {% if error %}
                    <div class="alert alert-danger">{{ error }}</div>
                    {% endif %}

                    <form action="/register" method="POST">
                        <div class="mb-3">
                            <label class="form-label"><i class="bi bi-person"></i> Full Name</label>
                            <input type="text" name="full_name" class="form-control" placeholder="Enter your full name" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label"><i class="bi bi-envelope"></i> Email</label>
                            <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label"><i class="bi bi-lock"></i> Password</label>
                            <input type="password" name="password" class="form-control" placeholder="Create a password" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label"><i class="bi bi-gender-ambiguous"></i> Gender</label>
                            <select name="gender" class="form-select">
                                <option value="">-- Select --</option>
                                <option value="Male">Male</option>
                                <option value="Female">Female</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label d-block"><i class="bi bi-mortarboard"></i> Education Level</label>
                            <div class="edu-options">
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="education" value="School" id="edu1" required>
                                    <label class="form-check-label" for="edu1">School</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="education" value="PU/12th" id="edu2">
                                    <label class="form-check-label" for="edu2">PU / 12th</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="education" value="Degree" id="edu3">
                                    <label class="form-check-label" for="edu3">Degree</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="education" value="Post Graduate" id="edu4">
                                    <label class="form-check-label" for="edu4">Post Graduate</label>
                                </div>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label"><i class="bi bi-book"></i> Course</label>
                                <input type="text" name="course" class="form-control" placeholder="e.g. BCA, BCom">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label"><i class="bi bi-calendar3"></i> Semester</label>
                                <input type="text" name="semester" class="form-control" placeholder="e.g. 6th Sem">
                            </div>
                        </div>

                        <button class="btn btn-register btn-primary w-100 text-white mt-2">Create Account</button>
                    </form>

                    <p class="text-center mt-4 mb-0 text-muted">
                        Already have an account? <a href="/login" class="text-decoration-none fw-semibold">Login here</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
